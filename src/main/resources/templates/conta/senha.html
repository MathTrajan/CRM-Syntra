<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Minha Senha — Syntra</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(paginaAtiva='conta-senha')}"></div>

<div class="main-content">
    <div th:replace="~{fragments/navbar :: navbar(titulo='Minha Senha')}"></div>

    <div class="page-body">
        <div class="page-header">
            <div>
                <h1 class="page-title">Alterar Senha</h1>
                <p class="page-subtitle">Atualize sua credencial sem depender do administrador.</p>
            </div>
        </div>

        <div th:if="${sucesso}" class="alert alert-success">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            <span th:text="${sucesso}"></span>
        </div>
        <div th:if="${erro}" class="alert alert-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            <span th:text="${erro}"></span>
        </div>

        <div class="card" style="max-width: 560px;">
            <form th:action="@{/senha}" th:object="${alterarSenhaForm}" method="post">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                <div class="form-group">
                    <label class="form-label" for="senhaAtual">Senha atual</label>
                    <input id="senhaAtual" type="password" th:field="*{senhaAtual}" class="form-input" autocomplete="current-password"/>
                    <p th:if="${#fields.hasErrors('senhaAtual')}" th:errors="*{senhaAtual}" class="form-error"></p>
                </div>

                <div class="form-row mt-4">
                    <div class="form-group">
                        <label class="form-label" for="novaSenha">Nova senha</label>
                        <input id="novaSenha" type="password" th:field="*{novaSenha}" class="form-input" autocomplete="new-password"/>
                        <p class="form-help">Use entre 6 e 72 caracteres.</p>
                        <p th:if="${#fields.hasErrors('novaSenha')}" th:errors="*{novaSenha}" class="form-error"></p>
                    </div>

                    <div class="form-group">
                        <label class="form-label" for="confirmarSenha">Confirmar nova senha</label>
                        <input id="confirmarSenha" type="password" th:field="*{confirmarSenha}" class="form-input" autocomplete="new-password"/>
                        <p th:if="${#fields.hasErrors('confirmarSenha')}" th:errors="*{confirmarSenha}" class="form-error"></p>
                    </div>
                </div>

                <p th:if="${#fields.hasGlobalErrors()}" th:each="err : ${#fields.globalErrors()}" th:text="${err}" class="form-error mt-3"></p>

                <div class="d-flex gap-3 mt-4">
                    <button type="submit" class="btn btn-primary">Salvar nova senha</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
