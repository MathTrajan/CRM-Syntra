<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<aside th:fragment="sidebar(paginaAtiva)" class="sidebar" id="sidebar">

    <div class="sidebar-header">
        <div class="brand-logo">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <path d="M2 12 H5.5 L8 6.5 L11.5 17.5 L15 7.5 L17.5 12 H22"
                      stroke="#F5B82E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <div class="brand-text">
            <span class="brand-name">Syntra</span>
            <span class="brand-tagline">CRM Leads</span>
        </div>
    </div>

    <nav class="sidebar-nav">
        <span class="nav-section-label">Principal</span>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/usuarios}"
           th:class="${paginaAtiva == 'usuarios'} ? 'nav-item active' : 'nav-item'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                <line x1="19" y1="8" x2="19" y2="14"/>
                <line x1="22" y1="11" x2="16" y2="11"/>
            </svg>
            Usuarios
        </a>

        <a th:href="@{/dashboard}"
           th:class="${paginaAtiva == 'dashboard'} ? 'nav-item active' : 'nav-item'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="8" height="8" rx="1"/>
                <rect x="13" y="3" width="8" height="8" rx="1"/>
                <rect x="13" y="13" width="8" height="8" rx="1"/>
                <rect x="3" y="13" width="8" height="8" rx="1"/>
            </svg>
            Dashboard
        </a>

        <a th:href="@{/leads}"
           th:class="${paginaAtiva == 'leads'} ? 'nav-item active' : 'nav-item'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                <circle cx="9" cy="7" r="4"/>
                <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
            </svg>
            Leads
            <span class="nav-badge" id="sidebar-nao-lidos" style="display:none"></span>
        </a>

        <a th:href="@{/perfil}"
           th:class="${paginaAtiva == 'perfil'} ? 'nav-item active' : 'nav-item'">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21a8 8 0 1 0-16 0"/>
                <circle cx="12" cy="7" r="4"/>
            </svg>
            Perfil
        </a>
    </nav>

    <div class="sidebar-footer">
        <div class="user-card">
            <div class="user-avatar" id="userAvatar">?</div>
            <div class="user-info">
                <span class="user-name" sec:authentication="name">Usuario</span>
                <span class="user-role" sec:authorize="hasRole('ADMIN')">Administrador</span>
                <span class="user-role" sec:authorize="hasRole('VENDEDOR')">Vendedor</span>
            </div>
            <form th:action="@{/logout}" method="post" style="margin:0;padding:0;line-height:0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="logout-btn" title="Sair">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                        <polyline points="16 17 21 12 16 7"/>
                        <line x1="21" y1="12" x2="9" y2="12"/>
                    </svg>
                </button>
            </form>
        </div>
    </div>

</aside>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="closeSidebar()"></div>

</body>
</html>
