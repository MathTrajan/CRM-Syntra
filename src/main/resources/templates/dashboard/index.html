<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Dashboard — Syntra</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>

<div th:replace="~{fragments/sidebar :: sidebar(paginaAtiva='dashboard')}"></div>

<div class="main-content">

    <div th:replace="~{fragments/navbar :: navbar(titulo='Dashboard')}"></div>

    <div class="page-body">

        <!-- Page header -->
        <div class="page-header">
            <div>
                <h1 class="page-title">Visão Geral</h1>
                <p class="page-subtitle">Resumo de desempenho do pipeline de leads</p>
            </div>
            <a th:href="@{/leads}" class="btn btn-primary">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                    <circle cx="9" cy="7" r="4"/>
                    <line x1="19" y1="8" x2="19" y2="14"/>
                    <line x1="22" y1="11" x2="16" y2="11"/>
                </svg>
                Ver Leads
            </a>
        </div>

        <!-- Métricas principais -->
        <div class="metrics-grid">

            <div class="metric-card mc-blue fade-in">
                <div class="metric-icon mi-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
                        <circle cx="9" cy="7" r="4"/>
                        <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
                        <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Total de Leads</span>
                    <span class="metric-value" th:text="${metricas.total}">0</span>
                </div>
            </div>

            <div class="metric-card mc-green fade-in">
                <div class="metric-icon mi-green">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/>
                        <polyline points="17 6 23 6 23 12"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Convertidos</span>
                    <span class="metric-value mv-green" th:text="${metricas.convertidos}">0</span>
                </div>
            </div>

            <div class="metric-card mc-purple fade-in">
                <div class="metric-icon mi-purple">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
                        <polyline points="22 4 12 14.01 9 11.01"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Taxa de Conversão</span>
                    <span class="metric-value mv-purple"
                          th:text="${metricas.taxaConversao} + '%'">0%</span>
                </div>
            </div>

            <div class="metric-card mc-red fade-in">
                <div class="metric-icon mi-red">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                        <line x1="12" y1="8" x2="12" y2="12"/>
                        <line x1="12" y1="16" x2="12.01" y2="16"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Não Lidos</span>
                    <span class="metric-value mv-red" th:text="${metricas.semLer}">0</span>
                </div>
            </div>

        </div>

        <!-- Segunda linha -->
        <div class="metrics-grid metrics-grid-3">

            <div class="metric-card mc-amber fade-in">
                <div class="metric-icon mi-amber">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Em Atendimento</span>
                    <span class="metric-value mv-amber" th:text="${metricas.emAtendimento}">0</span>
                </div>
            </div>

            <div class="metric-card mc-gold fade-in">
                <div class="metric-icon mi-gold">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <circle cx="12" cy="12" r="10"/>
                        <polyline points="12 6 12 12 16 14"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Aguardando Retorno</span>
                    <span class="metric-value mv-gold" th:text="${metricas.aguardando}">0</span>
                </div>
            </div>

            <div class="metric-card mc-blue fade-in">
                <div class="metric-icon mi-blue">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                        <line x1="16" y1="2" x2="16" y2="6"/>
                        <line x1="8" y1="2" x2="8" y2="6"/>
                        <line x1="3" y1="10" x2="21" y2="10"/>
                    </svg>
                </div>
                <div class="metric-body">
                    <span class="metric-label">Recebidos Hoje</span>
                    <span class="metric-value" th:text="${metricas.hoje}">0</span>
                </div>
            </div>

        </div>

        <!-- Status Breakdown -->
        <div class="card mt-6">
            <h2 class="section-title">Distribuição por Status</h2>
            <div class="breakdown">

                <div class="breakdown-row">
                    <div class="breakdown-label">
                        <span class="badge badge-novo">
                            <span class="badge-dot"></span>Novo
                        </span>
                    </div>
                    <div class="breakdown-track">
                        <div class="breakdown-bar bar-novo"
                             th:style="'width:' + (${metricas.total} > 0 ? (${metricas.novos} * 100 / ${metricas.total}) : 0) + '%'"></div>
                    </div>
                    <span class="breakdown-count" th:text="${metricas.novos}">0</span>
                </div>

                <div class="breakdown-row">
                    <div class="breakdown-label">
                        <span class="badge badge-em-atendimento">
                            <span class="badge-dot"></span>Em Atendimento
                        </span>
                    </div>
                    <div class="breakdown-track">
                        <div class="breakdown-bar bar-em-atendimento"
                             th:style="'width:' + (${metricas.total} > 0 ? (${metricas.emAtendimento} * 100 / ${metricas.total}) : 0) + '%'"></div>
                    </div>
                    <span class="breakdown-count" th:text="${metricas.emAtendimento}">0</span>
                </div>

                <div class="breakdown-row">
                    <div class="breakdown-label">
                        <span class="badge badge-aguardando-retorno">
                            <span class="badge-dot"></span>Aguardando
                        </span>
                    </div>
                    <div class="breakdown-track">
                        <div class="breakdown-bar bar-aguardando-retorno"
                             th:style="'width:' + (${metricas.total} > 0 ? (${metricas.aguardando} * 100 / ${metricas.total}) : 0) + '%'"></div>
                    </div>
                    <span class="breakdown-count" th:text="${metricas.aguardando}">0</span>
                </div>

                <div class="breakdown-row">
                    <div class="breakdown-label">
                        <span class="badge badge-convertido">
                            <span class="badge-dot"></span>Convertido
                        </span>
                    </div>
                    <div class="breakdown-track">
                        <div class="breakdown-bar bar-convertido"
                             th:style="'width:' + (${metricas.total} > 0 ? (${metricas.convertidos} * 100 / ${metricas.total}) : 0) + '%'"></div>
                    </div>
                    <span class="breakdown-count" th:text="${metricas.convertidos}">0</span>
                </div>

                <div class="breakdown-row">
                    <div class="breakdown-label">
                        <span class="badge badge-perdido">
                            <span class="badge-dot"></span>Perdido
                        </span>
                    </div>
                    <div class="breakdown-track">
                        <div class="breakdown-bar bar-perdido"
                             th:style="'width:' + (${metricas.total} > 0 ? (${metricas.perdidos} * 100 / ${metricas.total}) : 0) + '%'"></div>
                    </div>
                    <span class="breakdown-count" th:text="${metricas.perdidos}">0</span>
                </div>

            </div>
        </div>

    </div>
</div>

<script th:src="@{/js/app.js}"></script>
</body>
</html>
