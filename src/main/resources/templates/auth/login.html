<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Syntra — Entrar</title>
    <link rel="icon" type="image/svg+xml" th:href="@{/images/favicon.svg}"/>
    <link rel="preconnect" href="https://fonts.googleapis.com"/>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body class="login-page">

<!-- Backgrounds -->
<div class="login-dots"></div>
<div class="login-glow-1"></div>
<div class="login-glow-2"></div>

<div class="login-container fade-in">

    <!-- Brand -->
    <div class="login-brand">
        <div class="login-logo">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
                <path d="M2 12 H5.5 L8 6.5 L11.5 17.5 L15 7.5 L17.5 12 H22"
                      stroke="#F5B82E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </div>
        <span class="login-brand-name">Syntra</span>
    </div>
    <p class="login-sub">Plataforma de Gestão de Leads</p>

    <!-- Card -->
    <div class="login-card">

        <h1 class="login-title">Acesse sua conta</h1>

        <!-- Alerts -->
        <div th:if="${param.erro}" class="alert alert-error">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="12" cy="12" r="10"/>
                <line x1="15" y1="9" x2="9" y2="15"/>
                <line x1="9" y1="9" x2="15" y2="15"/>
            </svg>
            Email ou senha incorretos. Tente novamente.
        </div>

        <div th:if="${param.saiu}" class="alert alert-info">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            Você saiu com sucesso.
        </div>

        <form action="/login" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

            <div class="login-form-group">
                <label class="login-label">Email</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                    <input type="email" name="username" placeholder="seu@email.com"
                           class="login-input" required autofocus/>
                </div>
            </div>

            <div class="login-form-group">
                <label class="login-label">Senha</label>
                <div class="input-icon-wrap">
                    <span class="input-icon">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <input type="password" name="password" placeholder="••••••••"
                           class="login-input" required/>
                </div>
            </div>

            <button type="submit" class="login-btn">Entrar</button>
        </form>

    </div>

    <p style="text-align:center; margin-top:20px; font-size:11px; color:var(--text-muted)">
        Syntra &copy; 2025 · Acesso restrito
    </p>

</div>

</body>
</html>
