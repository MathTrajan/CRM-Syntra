# === Servidor ===
spring.application.name=Syntra
server.port=${PORT:8080}

# === Banco de dados ===
spring.datasource.url=${DATABASE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
# open-in-view=true porque o Lead tem ManyToOne LAZY (vendedor) que e' acessado
# pelos templates Thymeleaf (lead.vendedor.nome). Sem isso, qualquer pagina que
# renderiza um lead com vendedor atribuido lanca LazyInitializationException.
spring.jpa.open-in-view=true

# === Flyway ===
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

# === Thymeleaf ===
spring.thymeleaf.cache=true
spring.thymeleaf.encoding=UTF-8

# === Sessão (30 minutos de inatividade) ===
server.servlet.session.timeout=8h
server.error.whitelabel.enabled=false
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false

# === Security ===
syntra.webhook.secret=${WEBHOOK_SECRET}
syntra.admin.email=${ADMIN_EMAIL:admin@syntra.com}
syntra.admin.password=${ADMIN_PASSWORD:admin123}
syntra.integrations.divia.base-url=${DIVIA_API_BASE_URL:}
syntra.integrations.divia.token=${DIVIA_API_TOKEN:}

# === Logs ===
logging.level.com.syntra=INFO
logging.level.org.springframework.security=WARN
