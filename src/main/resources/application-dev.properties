# === Dev local com H2 (sem Neon) ===
spring.datasource.url=jdbc:h2:mem:syntra;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Credenciais do admin do seed dev (DataInitializer)
syntra.admin.email=matheustrajano.dev@gmail.com
syntra.admin.password=123456

# Segredos sao opcionais em dev (sobrescrevem ${WEBHOOK_SECRET} de application.properties)
syntra.webhook.secret=dev-webhook-secret-local
syntra.integrations.divia.base-url=
syntra.integrations.divia.token=

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Desliga Flyway no perfil dev (H2 não suporta ENUM do Postgres)
spring.flyway.enabled=false

# H2 Console no browser: http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Cria tabelas via script H2 (dados criados pelo DataInitializer)
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:db/dev/schema-h2.sql

# Recarrega templates sem reiniciar o servidor
spring.thymeleaf.cache=false

# Páginas de erro sem expor stack trace
server.error.include-message=never
server.error.include-stacktrace=never
server.error.include-exception=false